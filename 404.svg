<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      @keyframes glitch {
        0%, 88%, 100% {
          transform: translate(0, 0);
          opacity: 1;
        }
        89% {
          transform: translate(-3px, 1px);
          opacity: 0.75;
          clip-path: inset(8% 0 78% 0);
        }
        91% {
          transform: translate(3px, -2px);
          opacity: 0.85;
          clip-path: inset(65% 0 10% 0);
        }
        93% {
          transform: translate(-1px, 0);
          opacity: 0.6;
        }
        95% {
          transform: translate(2px, 1px);
          opacity: 0.9;
          clip-path: inset(40% 0 30% 0);
        }
        97% {
          transform: translate(0, 0);
          opacity: 1;
          clip-path: none;
        }
      }

      @keyframes ghost-shift {
        0%, 88%, 100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        90% {
          transform: translate(4px, -1px);
          opacity: 0.3;
        }
        92% {
          transform: translate(-4px, 2px);
          opacity: 0.2;
        }
        94% {
          transform: translate(2px, 0);
          opacity: 0.15;
        }
        96% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }

      @keyframes ghost-shift-alt {
        0%, 87%, 100% {
          transform: translate(0, 0);
          opacity: 0;
        }
        89% {
          transform: translate(-3px, 1px);
          opacity: 0.25;
        }
        91% {
          transform: translate(5px, -2px);
          opacity: 0.2;
        }
        93% {
          transform: translate(-1px, 1px);
          opacity: 0.1;
        }
        96% {
          transform: translate(0, 0);
          opacity: 0;
        }
      }

      .main-text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 140px;
        font-weight: 700;
        letter-spacing: 8px;
        fill: #c9d1d9;
        animation: glitch 4s infinite;
      }

      .ghost-red {
        font-family: 'Courier New', Courier, monospace;
        font-size: 140px;
        font-weight: 700;
        letter-spacing: 8px;
        fill: #ff6b6b;
        animation: ghost-shift 4s infinite;
      }

      .ghost-cyan {
        font-family: 'Courier New', Courier, monospace;
        font-size: 140px;
        font-weight: 700;
        letter-spacing: 8px;
        fill: #6bcfff;
        animation: ghost-shift-alt 4s infinite;
      }
    </style>
  </defs>

  <!-- Dark background — consistent look on both dark and light GitHub themes -->
  <rect width="600" height="200" fill="#0d1117" rx="8"/>

  <!-- Chromatic aberration ghost layers — only visible during glitch bursts -->
  <text class="ghost-red" x="300" y="138" text-anchor="middle" dominant-baseline="central">404</text>
  <text class="ghost-cyan" x="300" y="138" text-anchor="middle" dominant-baseline="central">404</text>

  <!-- Primary text -->
  <text class="main-text" x="300" y="138" text-anchor="middle" dominant-baseline="central">404</text>
</svg>
