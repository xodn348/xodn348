<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <style>
      @keyframes glitch-main {
        0%, 78%, 100% { transform: translate(0,0); opacity: 1; clip-path: none; }
        80% { transform: translate(-4px, 2px); opacity: 0.7; clip-path: inset(5% 0 75% 0); }
        82% { transform: translate(4px, -2px); opacity: 0.85; clip-path: inset(60% 0 8% 0); }
        84% { transform: translate(-2px, 0); opacity: 0.5; }
        86% { transform: translate(3px, 1px); opacity: 0.9; clip-path: inset(35% 0 35% 0); }
        88% { transform: translate(0,0); opacity: 1; clip-path: none; }
      }

      @keyframes glitch-red {
        0%, 78%, 100% { transform: translate(0,0); opacity: 0; }
        80% { transform: translate(5px, -1px); opacity: 0.3; }
        82% { transform: translate(-5px, 2px); opacity: 0.2; }
        84% { transform: translate(3px, 0); opacity: 0.25; }
        86% { transform: translate(-2px, 1px); opacity: 0.15; }
        88% { transform: translate(0,0); opacity: 0; }
      }

      @keyframes glitch-cyan {
        0%, 77%, 100% { transform: translate(0,0); opacity: 0; }
        79% { transform: translate(-4px, 1px); opacity: 0.25; }
        81% { transform: translate(5px, -2px); opacity: 0.2; }
        83% { transform: translate(-2px, 1px); opacity: 0.2; }
        85% { transform: translate(3px, 0); opacity: 0.1; }
        88% { transform: translate(0,0); opacity: 0; }
      }

      .layer-main { fill: #e6edf3; animation: glitch-main 2.5s infinite; }
      .layer-red { fill: #ff6b6b; animation: glitch-red 2.5s infinite; }
      .layer-cyan { fill: #58a6ff; animation: glitch-cyan 2.5s infinite; }
    </style>

    <!-- Shared geometry: "404" as geometric shapes -->
    <g id="digits">
      <!-- First "4": diagonal + crossbar + vertical stem -->
      <g transform="translate(87,30)">
        <polygon points="75,0 105,0 30,66 0,66"/>
        <rect x="0" y="66" width="135" height="26"/>
        <rect x="105" y="0" width="30" height="120"/>
      </g>

      <!-- "0": bold rounded rect with evenodd cutout -->
      <g transform="translate(246,30)">
        <path fill-rule="evenodd" d="M18,0 H90 Q108,0 108,18 V102 Q108,120 90,120 H18 Q0,120 0,102 V18 Q0,0 18,0 Z M38,30 H70 Q78,30 78,38 V82 Q78,90 70,90 H38 Q30,90 30,82 V38 Q30,30 38,30 Z"/>
      </g>

      <!-- Second "4" -->
      <g transform="translate(378,30)">
        <polygon points="75,0 105,0 30,66 0,66"/>
        <rect x="0" y="66" width="135" height="26"/>
        <rect x="105" y="0" width="30" height="120"/>
      </g>
    </g>
  </defs>

  <!-- Background -->
  <rect width="600" height="180" fill="#0d1117" rx="6"/>

  <!-- Chromatic aberration ghost layers -->
  <g class="layer-red"><use href="#digits"/></g>
  <g class="layer-cyan"><use href="#digits"/></g>

  <!-- Primary layer -->
  <g class="layer-main"><use href="#digits"/></g>
</svg>
